name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        working-directory: ./app

      - name: Run Lint
        run: npm run lint
        working-directory: ./app

      - name: Run Tests
        run: npm test
        working-directory: ./app

      - name: Build Docker Image
        run: docker build -t devops-app:latest .